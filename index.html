<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FerreRutas Mejín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            height: 100dvh;
            overflow: hidden;
        }
        .leaflet-container {
            font-family: inherit;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col h-[100dvh]">

    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-4 bg-gradient-to-b from-blue-700 to-indigo-900">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-white text-4xl shadow-md">🗺️</div>
            <h1 class="text-2xl font-black text-gray-800">FerreRutas Mejín</h1>
            <p class="text-sm text-gray-500 mb-6">Gestión Logística Inteligente</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-600 block mb-1">Usuario</label>
                    <input type="text" id="username" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="admin o juan">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-600 block mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="123">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg text-sm">Ingresar</button>
            </div>
            
            <div class="mt-6 p-3 bg-blue-50 rounded-xl text-xs text-blue-800">
                <span class="font-bold">Cuentas de prueba iniciales:</span><br>
                Admin: <code class="bg-white px-1 rounded">admin</code> / <code class="bg-white px-1 rounded">123</code><br>
                Repartidor: <code class="bg-white px-1 rounded">juan</code> / <code class="bg-white px-1 rounded">123</code>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-100 text-blue-700 font-bold rounded-full flex items-center justify-center text-sm shadow-inner" id="user-avatar">AD</div>
                <div>
                    <h2 class="text-sm font-black text-gray-800" id="app-title">FerreRutas Mejín</h2>
                    <p class="text-[11px] font-bold text-blue-600 uppercase tracking-wider" id="user-role">Administrador</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="p-2 text-gray-400 hover:text-red-500 rounded-xl hover:bg-gray-50 transition text-xs font-bold flex items-center space-x-1">
                <span>Salir</span> 🚪
            </button>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
            
            <div class="flex-1 h-full relative">
                <div id="map" class="w-full h-full"></div>
            </div>

            <div id="map-picker-banner" class="hidden absolute top-4 left-4 right-4 md:left-auto md:w-96 bg-blue-600 text-white p-3 rounded-xl shadow-2xl z-[40] flex justify-between items-center animate-bounce">
                <span class="text-xs font-bold">📍 Toca el mapa para fijar el pin</span>
                <button onclick="cancelMapPicker()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-xs font-bold transition">Cancelar</button>
            </div>

            <div id="profile-modal" class="hidden absolute inset-0 z-[50] bg-black/50 flex justify-center items-center p-4">
                <div class="bg-white p-5 rounded-2xl shadow-xl w-full max-w-sm">
                    <h3 class="font-black text-gray-800 text-lg mb-3 border-b pb-2">👤 Mi Perfil</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Usuario (Login)</label>
                            <input type="text" id="prof-username" class="w-full p-2 bg-gray-100 border rounded-lg text-sm text-gray-500" disabled>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Nombre a mostrar</label>
                            <input type="text" id="prof-name" class="w-full p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">Nueva Contraseña</label>
                            <input type="text" id="prof-pass" class="w-full p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex space-x-2 mt-4 pt-2">
                            <button onclick="saveProfile()" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg">Guardar Datos</button>
                            <button onclick="closeProfileForm()" class="bg-gray-200 text-gray-700 font-bold px-4 py-2 rounded-lg">Cerrar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="admin-panel" class="hidden w-full md:w-96 bg-white border-r md:border-l border-gray-200 flex flex-col absolute md:relative inset-0 z-[20] md:z-auto transition-transform transform translate-x-full md:translate-x-0 overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                    <h3 class="font-black text-gray-800 text-base">Directorio</h3>
                    <div class="flex space-x-1">
                        <button onclick="showProfileForm()" class="bg-gray-200 text-gray-700 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-gray-300">👤 Perfil</button>
                        <button onclick="showStoreForm()" class="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-700 shadow-sm">+ Agregar</button>
                        <button onclick="toggleAdminPanelMobile()" class="md:hidden bg-gray-200 text-gray-700 text-xs font-bold px-3 py-1.5 rounded-lg">X</button>
                    </div>
                </div>

                <div id="store-form-container" class="hidden p-4 border-b border-blue-100 bg-blue-50/50 space-y-3 overflow-y-auto max-h-[65%] shadow-inner">
                    <h4 class="text-xs font-black text-blue-800 uppercase tracking-wider" id="form-title">Nueva Ferretería</h4>
                    <input type="hidden" id="form-id">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <label class="text-[10px] font-bold text-gray-500">Nombre Comercial</label>
                            <input type="text" id="form-name" class="w-full p-2 text-xs bg-white border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] font-bold text-gray-500">Dirección</label>
                            <input type="text" id="form-address" class="w-full p-2 text-xs bg-white border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="col-span-2 mt-1">
                            <button onclick="activateMapPicker()" class="w-full bg-blue-100 text-blue-700 border border-blue-300 text-[11px] font-bold py-2 rounded-lg flex items-center justify-center hover:bg-blue-200 transition">
                                📍 Toca aquí para ubicar en el mapa
                            </button>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-500">Latitud</label>
                            <input type="number" step="any" id="form-lat" class="w-full p-2 text-xs bg-gray-100 border rounded-lg outline-none" readonly>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500">Longitud</label>
                            <input type="number" step="any" id="form-lng" class="w-full p-2 text-xs bg-gray-100 border rounded-lg outline-none" readonly>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-500">Zona</label>
                            <input type="text" id="form-zone" class="w-full p-2 text-xs bg-white border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500">Categoría</label>
                            <select id="form-category" class="w-full p-2 text-xs bg-white border rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="Mayorista">Mayorista</option>
                                <option value="Minorista">Minorista</option>
                                <option value="Destacado">Destacado</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] font-bold text-gray-500">Notas Adicionales</label>
                            <input type="text" id="form-notes" class="w-full p-2 text-xs bg-white border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="flex space-x-2 pt-2">
                        <button onclick="saveStoreData()" class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 rounded-lg shadow-sm">Guardar Ferretería</button>
                        <button onclick="hideStoreForm()" class="bg-gray-300 hover:bg-gray-400 text-gray-700 text-xs font-bold px-3 py-2 rounded-lg">Cancelar</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-2 space-y-2" id="store-list-container">
                    </div>
            </div>

            <div id="driver-panel" class="hidden absolute bottom-4 left-4 right-4 bg-white rounded-2xl shadow-2xl border border-gray-100 p-4 z-[20] max-w-sm mx-auto flex flex-col max-h-[40%] overflow-hidden">
                <div class="flex justify-between items-center mb-2 pb-2 border-b">
                    <h3 class="font-black text-gray-800 text-sm flex items-center">📦 Mi Ruta</h3>
                    <span class="text-[10px] font-bold px-2 py-0.5 bg-green-100 text-green-800 rounded-full" id="route-progress">0/0 Entregas</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-2" id="driver-tasks-container">
                </div>
            </div>

        </main>

        <footer class="bg-white border-t border-gray-200 grid grid-cols-3 py-2 shadow-inner z-10">
            <button onclick="switchTab('mapa')" id="tab-mapa" class="flex flex-col items-center justify-center text-blue-600 transition">
                <span class="text-xl">🗺️</span>
                <span class="text-[10px] font-bold uppercase tracking-wider mt-0.5">Mapa</span>
            </button>
            <button onclick="switchTab('datos')" id="tab-datos" class="flex flex-col items-center justify-center text-gray-400 transition">
                <span class="text-xl">📋</span>
                <span class="text-[10px] font-bold uppercase tracking-wider mt-0.5" id="tab-datos-text">Directorio</span>
            </button>
            <button onclick="switchTab('ruta')" id="tab-ruta" class="flex flex-col items-center justify-center text-gray-400 transition relative">
                <span class="text-xl">🚛</span>
                <span class="text-[10px] font-bold uppercase tracking-wider mt-0.5">Mi Ruta</span>
                <span id="badge-ruta" class="absolute top-1 right-8 bg-green-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-sm hidden">0</span>
            </button>
        </footer>
    </div>

    <script>
        let ferreterias = [];
        let systemUsers = [];
        let currentUser = null;
        let map = null;
        let markersGroup = null;
        let activeTab = 'mapa';
        let driverRouteIds = [1, 2, 3]; 
        let completedRouteIds = [];
        let isPickingLocation = false; // Variable para saber si estamos acomodando el mapa
        let tempMarker = null;

        // Iniciar Datos (Ferreterías y Usuarios)
        function initData() {
            const savedData = localStorage.getItem('mejin_ferreterias_v3');
            if (savedData) {
                ferreterias = JSON.parse(savedData);
            } else {
                ferreterias = [
                    { id: 1, name: "Ferrecentro El Constructor", address: "Av. Cristobal de Mendoza #420", zone: "Norte", category: "Mayorista", lat: -17.7682, lng: -63.1815, notes: "Dejar pedido en almacén central." },
                    { id: 2, name: "Ferretería Molina", address: "Av. San Aurelio esq. 3er Anillo", zone: "Sur", category: "Minorista", lat: -17.8015, lng: -63.1652, notes: "Cobro contra entrega." },
                    { id: 3, name: "Ferretería Hilda", address: "Doble Vía a La Guardia KM 6", zone: "Oeste", category: "Destacado", lat: -17.8210, lng: -63.2214, notes: "Llamar antes." }
                ];
                localStorage.setItem('mejin_ferreterias_v3', JSON.stringify(ferreterias));
            }

            const savedUsers = localStorage.getItem('mejin_usuarios');
            if (savedUsers) {
                systemUsers = JSON.parse(savedUsers);
            } else {
                systemUsers = [
                    { username: "admin", password: "123", name: "Administrador Central", role: "admin", avatar: "AD" },
                    { username: "juan", password: "123", name: "Juan Pérez", role: "driver", avatar: "JP" }
                ];
                localStorage.setItem('mejin_usuarios', JSON.stringify(systemUsers));
            }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([-17.7833, -63.1821], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markersGroup = L.layerGroup().addTo(map);

            // LOGICA PARA ATRAPAR EL CLIC AL ACOMODAR EL MAPA
            map.on('click', function(e) {
                if (isPickingLocation) {
                    document.getElementById('form-lat').value = e.latlng.lat.toFixed(6);
                    document.getElementById('form-lng').value = e.latlng.lng.toFixed(6);
                    
                    if(tempMarker) tempMarker.remove();
                    const icon = L.divIcon({ html: `<div style="font-size:24px;">📍</div>`, className: '' });
                    tempMarker = L.marker([e.latlng.lat, e.latlng.lng], {icon}).addTo(map);
                    
                    // Retornar al panel después de tocar el mapa
                    cancelMapPicker();
                }
            });
        }

        // Mostrar el banner flotante y esconder panel para dejar el mapa libre
        function activateMapPicker() {
            isPickingLocation = true;
            document.getElementById('admin-panel').classList.add('translate-x-full'); // Esconde panel
            document.getElementById('map-picker-banner').classList.remove('hidden'); // Muestra banner
        }

        function cancelMapPicker() {
            isPickingLocation = false;
            document.getElementById('map-picker-banner').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('translate-x-full'); // Regresa el panel
        }

        function updateMapMarkers() {
            if (!markersGroup) return;
            markersGroup.clearLayers();

            let storesToShow = currentUser && currentUser.role === 'driver' ? ferreterias.filter(f => driverRouteIds.includes(f.id)) : ferreterias;

            storesToShow.forEach(store => {
                const isCompleted = completedRouteIds.includes(store.id);
                const markerColor = isCompleted ? '#10B981' : (store.category === 'Mayorista' ? '#2563EB' : '#F59E0B');
                const customIcon = L.divIcon({
                    html: `<div style="background-color: ${markerColor}; width: 24px; height: 24px; display: flex; align-items:center; justify-content:center; border: 2px solid white; border-radius: 50%; color: white; font-size: 11px;">🛠️</div>`,
                    className: '', iconSize: [24, 24], iconAnchor: [12, 12]
                });
                const marker = L.marker([store.lat, store.lng], { icon: customIcon });
                marker.bindPopup(`<div class="p-1"><h4 class="font-black text-sm">${store.name}</h4><p class="text-xs text-gray-500">${store.address}</p></div>`);
                markersGroup.addLayer(marker);
            });
        }

        // Lógica de Login
        function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toLowerCase();
            const passIn = document.getElementById('password').value;

            const userFound = systemUsers.find(u => u.username === userIn && u.password === passIn);

            if (userFound) {
                currentUser = userFound;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                document.getElementById('app-title').innerText = currentUser.name;
                document.getElementById('user-avatar').innerText = currentUser.avatar;
                document.getElementById('user-role').innerText = currentUser.role === 'admin' ? 'Administrador' : 'Repartidor';
                document.getElementById('tab-datos-text').innerText = currentUser.role === 'admin' ? 'Directorio' : 'Lista';

                initMap();
                renderAdminList();
                renderDriverTasks();
                updateMapMarkers();
                switchTab('mapa');
            } else {
                alert("Usuario o contraseña incorrectos.");
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // --- FUNCIONES DE PERFIL DE USUARIO ---
        function showProfileForm() {
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('prof-username').value = currentUser.username;
            document.getElementById('prof-name').value = currentUser.name;
            document.getElementById('prof-pass').value = currentUser.password;
        }

        function closeProfileForm() {
            document.getElementById('profile-modal').classList.add('hidden');
        }

        function saveProfile() {
            const newName = document.getElementById('prof-name').value.trim();
            const newPass = document.getElementById('prof-pass').value.trim();
            
            if(!newName || !newPass) {
                alert("Los campos no pueden estar vacíos.");
                return;
            }

            // Actualizar datos del usuario activo
            currentUser.name = newName;
            currentUser.password = newPass;
            currentUser.avatar = newName.substring(0, 2).toUpperCase();

            // Guardar en la base de datos local
            const index = systemUsers.findIndex(u => u.username === currentUser.username);
            if(index !== -1) {
                systemUsers[index] = currentUser;
                localStorage.setItem('mejin_usuarios', JSON.stringify(systemUsers));
            }

            // Refrescar header
            document.getElementById('app-title').innerText = currentUser.name;
            document.getElementById('user-avatar').innerText = currentUser.avatar;

            closeProfileForm();
            alert("¡Tu perfil se ha actualizado correctamente!");
        }

        // --- RENDERIZADO DE VISTAS (VERSION ORIGINAL) ---
        function renderAdminList() {
            const container = document.getElementById('store-list-container');
            container.innerHTML = '';
            ferreterias.forEach(store => {
                const card = document.createElement('div');
                card.className = "p-3 bg-white border border-gray-100 rounded-xl shadow-sm flex flex-col space-y-1.5";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-black text-gray-800 text-xs">${store.name}</h4>
                            <p class="text-[10px] font-bold text-blue-600">📍 ${store.zone}</p>
                        </div>
                    </div>
                    <p class="text-[11px] text-gray-500">🏠 ${store.address}</p>
                    <div class="flex justify-end space-x-1 pt-1 border-t border-gray-50">
                        <button onclick="editStore(${store.id})" class="bg-blue-50 text-blue-700 hover:bg-blue-100 font-bold text-[10px] px-2.5 py-1 rounded-md transition">📝 Editar</button>
                        <button onclick="deleteStore(${store.id})" class="bg-red-50 text-red-600 hover:bg-red-100 font-bold text-[10px] px-2.5 py-1 rounded-md transition">🗑️ Borrar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderDriverTasks() {
            const container = document.getElementById('driver-tasks-container');
            container.innerHTML = '';
            let tasks = ferreterias.filter(f => driverRouteIds.includes(f.id));
            let finishedCount = 0;
            tasks.forEach(store => {
                const isDone = completedRouteIds.includes(store.id);
                if (isDone) finishedCount++;
                const item = document.createElement('div');
                item.className = `p-2.5 border rounded-xl flex items-start space-x-2.5 ${isDone ? 'bg-green-50' : 'bg-white'}`;
                item.innerHTML = `
                    <input type="checkbox" ${isDone ? 'checked' : ''} onclick="toggleDeliveryStatus(${store.id})" class="mt-1 w-4 h-4">
                    <div class="flex-1">
                        <h4 class="text-xs font-black ${isDone ? 'line-through text-gray-400' : ''}">${store.name}</h4>
                        <p class="text-[10px] text-gray-500">${store.address}</p>
                    </div>
                `;
                container.appendChild(item);
            });
            document.getElementById('route-progress').innerText = `${finishedCount}/${tasks.length} Entregas`;
            const badge = document.getElementById('badge-ruta');
            if (tasks.length - finishedCount > 0) {
                badge.innerText = tasks.length - finishedCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function toggleDeliveryStatus(id) {
            const idx = completedRouteIds.indexOf(id);
            if (idx > -1) completedRouteIds.splice(idx, 1);
            else completedRouteIds.push(id);
            renderDriverTasks();
            updateMapMarkers();
        }

        // --- CRUD FERRETERÍAS ---
        function showStoreForm() {
            document.getElementById('store-form-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Nueva Ferretería";
            document.getElementById('form-id').value = '';
            document.getElementById('form-name').value = '';
            document.getElementById('form-address').value = '';
            document.getElementById('form-zone').value = '';
            document.getElementById('form-lat').value = '-17.7833';
            document.getElementById('form-lng').value = '-63.1821';
            document.getElementById('form-notes').value = '';
        }

        function hideStoreForm() {
            document.getElementById('store-form-container').classList.add('hidden');
            if(tempMarker) tempMarker.remove();
        }

        function editStore(id) {
            const store = ferreterias.find(f => f.id === id);
            if (!store) return;
            showStoreForm();
            document.getElementById('form-title').innerText = "Editar Ferretería";
            document.getElementById('form-id').value = store.id;
            document.getElementById('form-name').value = store.name;
            document.getElementById('form-address').value = store.address;
            document.getElementById('form-zone').value = store.zone;
            document.getElementById('form-category').value = store.category;
            document.getElementById('form-lat').value = store.lat;
            document.getElementById('form-lng').value = store.lng;
            document.getElementById('form-notes').value = store.notes || '';
            map.flyTo([store.lat, store.lng], 15);
        }

        function saveStoreData() {
            const idVal = document.getElementById('form-id').value;
            const name = document.getElementById('form-name').value.trim();
            const lat = parseFloat(document.getElementById('form-lat').value);
            const lng = parseFloat(document.getElementById('form-lng').value);

            if (!name || isNaN(lat) || isNaN(lng)) { alert("Nombre y Ubicación son obligatorios."); return; }

            if (idVal) {
                const store = ferreterias.find(f => f.id == idVal);
                if (store) {
                    store.name = name;
                    store.address = document.getElementById('form-address').value;
                    store.zone = document.getElementById('form-zone').value;
                    store.lat = lat; store.lng = lng;
                }
            } else {
                const newId = ferreterias.length ? Math.max(...ferreterias.map(f => f.id)) + 1 : 1;
                ferreterias.push({ 
                    id: newId, name, lat, lng,
                    address: document.getElementById('form-address').value,
                    zone: document.getElementById('form-zone').value,
                    category: document.getElementById('form-category').value
                });
            }

            localStorage.setItem('mejin_ferreterias_v3', JSON.stringify(ferreterias));
            hideStoreForm();
            renderAdminList();
            renderDriverTasks();
            updateMapMarkers();
        }

        function deleteStore(id) {
            if (confirm("¿Borrar ferretería?")) {
                ferreterias = ferreterias.filter(f => f.id !== id);
                localStorage.setItem('mejin_ferreterias_v3', JSON.stringify(ferreterias));
                renderAdminList(); updateMapMarkers();
            }
        }

        function toggleAdminPanelMobile() {
            document.getElementById('admin-panel').classList.toggle('translate-x-full');
        }

        function switchTab(tab) {
            activeTab = tab;
            ['mapa', 'datos', 'ruta'].forEach(t => document.getElementById(`tab-${t}`).className = "flex flex-col items-center justify-center text-gray-400 transition");
            document.getElementById(`tab-${tab}`).className = "flex flex-col items-center justify-center text-blue-600 transition";

            document.getElementById('admin-panel').classList.add('translate-x-full');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('driver-panel').classList.add('hidden');

            if (tab === 'datos' && currentUser) {
                if (currentUser.role === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-panel').classList.remove('translate-x-full');
                } else document.getElementById('driver-panel').classList.remove('hidden');
            } else if (tab === 'ruta') document.getElementById('driver-panel').classList.remove('hidden');
            
            if (map) setTimeout(() => { map.invalidateSize(); }, 200);
        }

        initData();
    </script>
</body>
</html>
